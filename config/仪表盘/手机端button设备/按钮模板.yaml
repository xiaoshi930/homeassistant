按钮模板:
  triggers_update: all
  type: custom:button-card
  show_label: true
  label: |   ### 设置显示的名称
    [[[
        return "🔋  自定义"
    ]]]
  styles:
    card:
      - background: | ### 设置背景颜色颜色方式1：颜色切换会快一点,使用window.matchMedia('(prefers-color-scheme: dark)').matches获取当前主题
          [[[ 
              if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) theme = 'dark'; else theme = 'light';
              if (theme=="dark") return "rgb(83, 83, 83, 0.6)";
              if (theme=="light") return "rgb(255, 255, 255, 0.6)";
          ]]]
      # - background: | ### 设置背景颜色颜色方式2：颜色切换会慢一点，使用theme()函数获取当前主题
      #     [[[ 
      #         if (theme()=="dark") return "rgb(83, 83, 83, 0.6)";
      #         if (theme()=="light") return "rgb(255, 255, 255, 0.6)";
      #     ]]]
      - height: 24px
      - width: 16.8vw
      - border: none
      - border-radius: 10px
      - font-size: 11px
      - font-weight: 500
      - text-align: center
      - padding: 0
      - margin: 0
    label:
      - color: | ## 设置文本颜色
          [[[ 
              if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) theme = 'dark';
              else theme = 'light';
              if (theme =="dark") return "rgb(255,255, 255)";
              if (theme =="light") return "rgb(0, 0, 0)" ;
          ]]]
