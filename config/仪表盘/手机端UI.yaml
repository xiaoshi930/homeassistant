              - type: custom:button-card
                template: 油烟机卡片
              - type: custom:xiaoshi-phone-other-card
                entity: select.180319907614846_work_status
                theme: light
                width: 100%
                accent_color: |-
                  [[[
                      var a = "select.180319907614846_work_status";
                      if (states[a].state == "power_off") return "rgb(220,50,50,0.6)"
                  ]]]
                button_rows:
                  - items:
                      - mode: button
                        entity: select.180319907614846_work_status
                        custom_name: 保湿
                        select_option_names:
                          power_off: 关机
                          power_on: 开机
                          cancel: 取消
                          pause: 暂停
                          resume: 继续
                  - items:
                      - mode: button
                        entity: select.180319907614846_wash_mode
                        select_options:
                          - 90min_wash
                          - eco_wash
                          - self_define
                          - fruit_wash
                          - kill_germ
                        select_option_names:
                          90min_wash: 90分钟洗
                          eco_wash: 节能洗
                          self_define: 安全洗
                          fruit_wash: 水果洗
                          kill_germ: 强力洗
                  - items:
                      - mode: button
                        entity: button.chinese_poetry_update
                        select_option_names: null
                        custom_name: 烘干状态
                      - mode: button
                        entity: select.180319907614846_dry_step_switch
                        select_option_names:
                          cancel: 取消
                          waiting: 待机
                          running: 运行
                  - items:
                      - mode: button
                        entity: button.chinese_poetry_update
                        custom_name: 烘干时间
                      - mode: button
                        entity: select.180319907614846_air_set_hour
                        select_options:
                          - "24"
                          - "36"
                          - "48"
                        select_option_names:
                          "24": 24h
                          "36": 36h
                          "48": 48h
                state_display: |-
                  [[[
                      if (entity.state == "power_off") return "关机";
                      if (entity.state == "power_on") return "开机";
                      if (entity.state == "cancel") return "取消";
                      if (entity.state == "pause") return "暂停";
                      if (entity.state == "resume") return "继续";

                  ]]]

                  
